<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campanha Especial — Xalingo Brinquedos</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #f0ece6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-family: 'Nunito', sans-serif;
  }

  .page {
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px;
  }

  .cover-img {
    width: 100%;
    height: auto;
    display: block;
  }

  .btn-wrap {
    width: 100%;
    padding: 0 24px;
    margin-top: -2px;
    background: #fff;
  }

  .btn-catalogo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 18px 24px;
    background: #1B3A5C;
    color: #fff;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.3px;
  }

  .btn-catalogo:hover {
    background: #0d2240;
    transform: translateY(-1px);
  }

  .btn-catalogo:active {
    transform: scale(0.99);
  }

  .btn-catalogo svg {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }

  .btn-sub {
    background: #fff;
    padding: 10px 24px 20px;
    width: 100%;
    text-align: center;
    font-size: 0.75rem;
    color: #aaa;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="page">

  <img class="cover-img"
       src="capaorfertas.png"
       alt="Campanha Especial Xalingo — Dia das Crianças">

  <div class="btn-wrap">
    <a class="btn-catalogo" href="catalogo.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      Ver Catálogo de Produtos
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </a>
  </div>

  <div class="btn-sub">
    50 produtos com desconto especial · Válido enquanto durar o estoque
  </div>

</div>
</body>
</html>
